name: Deploy a AWS S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Estos secretos los debes crear en GitHub -> Settings -> Secrets
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-2' }}

      - name: Sincronizar archivos al nuevo Bucket
        run: |
          # Sincroniza el contenido de la raíz al bucket
          # Usamos --exclude ".git*" para no subir archivos internos de Git
          aws s3 sync . s3://hugo-prueba123 --delete --exclude ".git*"